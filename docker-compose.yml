version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: health-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-111111}
      MYSQL_DATABASE: ${DB_NAME:-test_db}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - health-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: health-app
    restart: always
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-111111}
      DB_NAME: ${DB_NAME:-test_db}
      FLASK_ENV: production
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - health-network

networks:
  health-network:
    driver: bridge

volumes:
  mysql_data: