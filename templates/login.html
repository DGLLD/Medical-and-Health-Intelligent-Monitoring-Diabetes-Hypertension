<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 医疗风险评估平台</title>
    <!-- 🔑 引入全局样式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- ========== 顶部导航栏 ========== -->
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='{{ url_for('index') }}'"> 医疗风险评估平台</div>
        <a href="{{ url_for('index') }}" class="back-link">← 返回首页</a>
    </nav>
    
    <!-- ========== 登录页面主体 ========== -->
    <div class="page-main">
        <div class="login-card">
            <h1 class="card-title">欢迎登录</h1>
            <p class="card-subtitle">请输入您的账号和密码</p>
            
            <!-- 🔴【重点】显示后端返回的错误或成功信息 -->
            <div id="messageBox" class="message-box"></div>
            
            <!-- ========== 登录表单 ========== -->
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <!-- 用户名输入框 -->
                <div class="form-group">
                    <label class="form-label">账号 (3-20个字符)</label>
                    <input type="text" class="form-input" id="username" placeholder="请输入账号" required>
                </div>
                
                <!-- 密码输入框 -->
                <div class="form-group">
                    <label class="form-label">密码 (3-12位纯数字)</label>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                </div>
                
                <!-- 🔴【重点】提交按钮 -->
                <button type="submit" class="submit-btn" id="submitBtn">登 录</button>
            </form>
            
            <!-- 注册跳转链接 -->
            <div class="bottom-links">
                还没有账号？<a href="{{ url_for('register_page') }}">立即注册</a>
            </div>
        </div>
    </div>
    
    <!-- ========== JavaScript 客户端逻辑 ========== -->
    <script>
        /**
         * 🔴【重点】处理登录表单提交
         */
        function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const messageBox = document.getElementById('messageBox');
            
            clearErrors();
            hideMessage();
            
            // === 前端格式验证 ===
            let isValid = validateInputs(username, password);
            if (!isValid) return false;
            
            // === 🔴【重点】调用后端登录接口 ===
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';
            
            fetch('{{ url_for("api_login") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success === true) {
                    showMessage('success', data.message || '登录成功！即将跳转...');
                    setTimeout(() => {
                        window.location.href = '{{ url_for("service_page") }}';
                    }, 800);
                } else {
                    showMessage('error', data.message || '登录失败，请检查账号密码');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登 录';
                }
            })
            .catch(error => {
                showMessage('error', '网络连接异常，请稍后重试');
                submitBtn.disabled = false;
                submitBtn.textContent = '登 录';
            });
            
            return false;
        }
        
        /**
         * 【函数】validateInputs - 前端格式验证
         */
        function validateInputs(username, password) {
            const usernamePattern = /^[a-zA-Z0-9_]{3,20}$/;
            const passwordPattern = /^\d{3,12}$/;
            
            if (!usernamePattern.test(username)) {
                showMessage('error', '账号需为 3-20 位字母/数字/下划线组合');
                return false;
            }
            if (!passwordPattern.test(password)) {
                showMessage('error', '密码需为 3-12 位纯数字');
                return false;
            }
            return true;
        }
        
        /**
         * 【辅助函数】清除错误提示样式
         */
        function clearErrors() {
            document.querySelectorAll('.form-input').forEach(el => el.classList.remove('input-error'));
        }
        
        /**
         * 【辅助函数】显示消息提示
         */
        function showMessage(type, text) {
            const msgBox = document.getElementById('messageBox');
            msgBox.className = `message-box ${type}-message`;
            msgBox.textContent = text;
            msgBox.style.display = 'block';
        }
        
        /**
         * 【辅助函数】隐藏消息提示
         */
        function hideMessage() {
            document.getElementById('messageBox').style.display = 'none';
        }
    </script>
</body>
</html>
